window.CUCUMBER_MESSAGES = [{"meta":{"protocolVersion":"24.1.0","implementation":{"name":"cucumber-jvm","version":"7.18.0"},"runtime":{"name":"OpenJDK 64-Bit Server VM","version":"21.0.11+10-LTS"},"os":{"name":"Windows 10"},"cpu":{"name":"amd64"}}},{"testRunStarted":{"timestamp":{"seconds":1784111349,"nanos":383064900}}},{"source":{"uri":"classpath:features/AddToCart.feature","data":"# ============================================================\n# Feature : Add to Cart — WowFashions Staging\n# Page    : https://staging.wowfashions.ae/in-en/products-list/readymade\n# Flow    : Navigate to readymade listing → click first product\n#           → add to cart → cart page\n# ============================================================\n\nFeature: Add to Cart on WowFashions\n\n  Background:\n    Given user opens a readymade product page\n\n  # ── Product Page Load ─────────────────────────────────────\n\n  Scenario: TC01 - Product page loads successfully\n    Then the product page loads successfully\n\n  Scenario: TC02 - Product name is displayed\n    Then the product name is displayed\n\n  Scenario: TC03 - Product price is displayed\n    Then the product price is displayed\n\n  Scenario: TC04 - Add to Cart button is visible and clickable\n    Then the Add to Cart button is visible\n    And  the Add to Cart button is clickable\n\n  # ── Add to Cart Actions ───────────────────────────────────\n\n  Scenario: TC05 - Clicking Add to Cart shows success notification\n    When user clicks the Add to Cart button\n    Then a success notification is displayed\n\n  Scenario: TC06 - Cart badge count increments after adding\n    When user clicks the Add to Cart button\n    Then the cart badge count increments\n\n  # ── Cart Page ─────────────────────────────────────────────\n\n  Scenario: TC07 - Cart shows the added product\n    When user clicks the Add to Cart button\n    And  user navigates to the cart page\n    Then the cart contains the added product\n\n  Scenario: TC08 - Product name in cart matches product page\n    When user clicks the Add to Cart button\n    And  user navigates to the cart page\n    Then the product name in cart matches the product page\n\n  Scenario: TC09 - Product price in cart is correct\n    When user clicks the Add to Cart button\n    And  user navigates to the cart page\n    Then the product price in cart is correct\n\n  Scenario: TC10 - User can remove item from cart\n    When user clicks the Add to Cart button\n    And  user navigates to the cart page\n    And  user removes the item from the cart\n    Then the cart shows an empty message\n\n  Scenario: TC11 - Empty cart shows appropriate message\n    When user navigates to the cart page\n    And  user clears all items from the cart\n    Then the cart shows an empty message\n","mediaType":"text/x.cucumber.gherkin+plain"}},{"gherkinDocument":{"uri":"classpath:features/AddToCart.feature","feature":{"location":{"line":8,"column":1},"tags":[],"language":"en","keyword":"Feature","name":"Add to Cart on WowFashions","description":"","children":[{"background":{"location":{"line":10,"column":3},"keyword":"Background","name":"","description":"","steps":[{"location":{"line":11,"column":5},"keyword":"Given ","keywordType":"Context","text":"user opens a readymade product page","id":"5df451d7-cfc1-4e0f-b55d-aca0e142d553"}],"id":"4452246c-05a2-4ba3-9dc9-801a8719cb89"}},{"scenario":{"location":{"line":15,"column":3},"tags":[],"keyword":"Scenario","name":"TC01 - Product page loads successfully","description":"","steps":[{"location":{"line":16,"column":5},"keyword":"Then ","keywordType":"Outcome","text":"the product page loads successfully","id":"60587a65-827f-4626-9d86-05c75331dd6c"}],"examples":[],"id":"b0ed9d9e-a842-48ba-8a54-397ef7a25160"}},{"scenario":{"location":{"line":18,"column":3},"tags":[],"keyword":"Scenario","name":"TC02 - Product name is displayed","description":"","steps":[{"location":{"line":19,"column":5},"keyword":"Then ","keywordType":"Outcome","text":"the product  page\n\n  # ── Positive Scenarios ──────────────────────────────────\n\n  Scenario: TC01 - Country selector widget is visible in the header\n    Then the country selector widget is visible in the header\n\n  Scenario: TC02 - Default India page shows INR symbol on all product prices\n    Then all product prices show the \"₹\" currency symbol\n\n  Scenario: TC03 - Switching to BHD changes all product prices to BHD\n    When user opens the country selector\n    And  user selects country \"Bahrain\"\n    Then all product prices show the \"BHD\" currency symbol\n\n  Scenario: TC04 - Switching back to India from UAE restores INR prices\n    When user opens the country selector\n    And  user selects country \"UAE\"\n    And  user opens the country selector\n    And  user selects country \"India\"\n    Then all product prices show the \"₹\" currency symbol\n\n  Scenario: TC05 - All visible product prices (not just first) show BHD after INR switch\n    When user opens the country selector\n    And  user selects country \"Bahrain\"\n    Then all visible product prices contain the \"BHD\" currency symbol\n\n  Scenario Outline: TC06 - Country to currency mapping is correct\n    When user opens the country selector\n    And  user selects country \"<country>\"\n    Then all product prices show the \"<symbol>\" currency symbol\n\n    Examples:\n      | country     | symbol |\n      | India       | ₹      |\n\n  Scenario: TC07 - Product listing still shows at least one product after country switch\n    When user opens the country selector\n    And  user selects country \"Bahrain\"\n    Then the product listing shows at least one product\n\n  # ── Negative Scenarios ──────────────────────────────────\n\n  Scenario: TC08 - AED symbol is not visible when India is selected by default\n    Then no product price shows the \"AED\" currency symbol\n\n  Scenario: TC09 - INR symbol is not visible after switching to UAE\n    When user opens the country selector\n    And  user selects country \"UAE\"\n    Then no product price shows the \"₹\" currency symbol\n\n  Scenario: TC10 - Product prices are non-empty after country switch\n    When user opens the country selector\n    And  user selects country \"UAE\"\n    Then product prices are non-empty after the country switch\n\n  Scenario: TC11 - Country selector dropdown closes after a valid selection\n    When user opens the country selector\n    And  user selects country \"UAE\"\n    Then the country selector dropdown is closed\n","mediaType":"text/x.cucumber.gherkin+plain"}},{"gherkinDocument":{"uri":"classpath:features/CountryCurrency.feature","feature":{"location":{"line":10,"column":1},"tags":[{"location":{"line":9,"column":1},"name":"@currencyswitch","id":"1f287ff1-bac2-4f1a-a063-e8d71b08e633"}],"language":"en","keyword":"Feature","name":"Country Currency Switch on WowFashions","description":"","children":[{"background":{"location":{"line":12,"column":3},"keyword":"Background","name":"","description":"","steps":[{"location":{"line":13,"column":5},"keyword":"Given ","keywordType":"Context","text":"user is on the India product listing page","id":"c832210d-6d49-4031-9194-eb6b9aaff954"}],"id":"fca5dddd-aba6-473f-b19a-8b46c75d6fb3"}},{"scenario":{"location":{"line":17,"column":3},"tags":[],"keyword":"Scenario","name":"TC01 - Country selector widget is visible in the header","description":"","steps":[{"location":{"line":18,"column":5},"keyword":"Then ","keywordType":"Outcome","text":"the country selector widget is visible in the header","id":"bfda3ee9-e673-4b10-be8d-d44f7ed4dd58"}],"examples":[],"id":"6cb15485-e8b2-4c0d-b9a7-bf9a1e98f87e"}},{"scenario":{"location":{"line":20,"column":3},"tags":[],"keyword":"Scenario","name":"TC02 - Default India page shows INR symbol on all product prices","description":"","steps":[{"location":{"line":21,"column":5},"keyword":"Then ","keywordType":"Outcome","text":"all product prices show the \"₹\" currency symbol","id":"928efc11-3a5b-4b31-ad85-eac96356cdd0"}],"examples" yCurrency.feature","name":"TC11 - Country selector dropdown closes after a valid selection","language":"en","steps":[{"astNodeIds":["c832210d-6d49-4031-9194-eb6b9aaff954"],"id":"10ce1612-a428-4e86-b12e-b7204a7306b8","type":"Context","text":"user is on the India product listing page"},{"astNodeIds":["3fb14783-f616-4246-851d-2e3e831ed38b"],"id":"252b9129-4f5e-40b4-a4e5-ec4b1ce51014","type":"Action","text":"user opens the country selector"},{"astNodeIds":["61f94533-0603-4c04-b8b0-42bb00468c0f"],"id":"ef1ed837-f499-4d67-a9fe-11f1958879c5","type":"Action","text":"user selects country \"UAE\""},{"astNodeIds":["d8c3f070-02fc-4c7e-88ac-1fe5ef882901"],"id":"02529b76-8f60-4178-9e5d-ab076a591dce","type":"Outcome","text":"the country selector dropdown is closed"}],"tags":[{"name":"@currencyswitch","astNodeId":"1f287ff1-bac2-4f1a-a063-e8d71b08e633"}],"astNodeIds":["f50fc70e-3434-493d-8cd3-1694828672a6"]}},{"source":{"uri":"classpath:features/FabricMaterialFilter.feature","data":"Feature: Fabric Material and Neck Pattern Filter on WowFashions\r\n\r\n  Background:\r\n    Given user opens the Jalabiya products page\r\n\r\n  # ── Fabric Material ────────────────────────────────────\r\n\r\n  Scenario: Fabric Material section is collapsed by default\r\n    Then the \"Fabric Material\" filter section should be collapsed by default\r\n\r\n\r\n  Scenario: User selects single fabric - Chiffon Zari\r\n    When user clicks on fabric material checkbox \"Chiffon Zari\"\r\n    Then the checkbox \"Chiffon Zari\" should be selected\r\n    And  the product grid should refresh\r\n\r\n\r\n  Scenario: User selects single fabric - Cotton Italy\r\n    When user clicks on fabric material checkbox \"Cotton Italy\"\r\n    Then the checkbox \"Cotton Italy\" should be selected\r\n    And  the product grid should refresh\r\n\r\n  Scenario: User selects single fabric - Linen\r\n    When user clicks on fabric material checkbox \"Linen\"\r\n    Then the checkbox \"Linen\" should be selected\r\n    And  the product grid should refresh\r\n\r\n  Scenario: User selects multiple fabrics\r\n    When user clicks on fabric material checkbox \"Chiffon Zari\"\r\n    And  user clicks on fabric material checkbox \"Linen\"\r\n    Then the checkbox \"Chiffon Zari\" should be selected\r\n    And  the checkbox \"Linen\" should be selected\r\n    And  the product grid should refresh\r\n\r\n  Scenario: User deselects a fabric after selecting it\r\n    When user clicks on fabric material checkbox \"Crepe\"\r\n    Then the checkbox \"Crepe\" should be selected\r\n    When user clicks on fabric material checkbox \"Crepe\"\r\n    Then the checkbox \"Crepe\" should be deselected\r\n    And  the product grid should refresh\r\n\r\n  Scenario Outline: All fabric materials can be selected\r\n    When user clicks on fabric material checkbox \"<fabric>\"\r\n    Then the checkbox \"<fabric>\" should be selected\r\n    And  the product grid should refresh\r\n\r\n    Examples:\r\n      | fabric          |\r\n      | Chiffon Zari    |\r\n      | Cotton Italy    |\r\n      | Cotton Jacquard |\r\n      | Cotton Spony    |\r\n      | Crepe           |\r\n      | Crepe Soft      |\r\n      | Jacquard        |\r\n      | Jacquard Namri  |\r\n      | Silk Jacquard   |\r\n\r\n  # ── Neck Pattern ───────────────────────────────────────\r\n\r\n  Scenario: Neck Pattern section is collapsed by default\r\n    Then the Neck Pattern filter section should be collapsed\r\n\r\n  Scenario: User expands Neck Pattern section\r\n    When user clicks to expand the \"Neck Pattern\" filter section\r\n    Then the \"Neck Pattern\" filter options should be visible\r\n\r\n  # ── Combined Filter ────────────────────────────────────\r\n\r\n  Scenario: User applies both Fabric Material and Neck Pattern filters\r\n    When user clicks on fabric material checkbox \"Jacquard\"\r\n    And  user clicks to expand the \"Neck Pattern\" filter section\r\n    And  user selects any first option in \"Neck Pattern\"\r\n    Then the product grid should refresh\r\n\r\n  # ── Reset ──────────────────────────────────────────────\r\n\r\n  Scenario: All checkboxes are cleared after reset\r\n    When user clicks on fabric material checkbox \"Linen\"\r\n    And  user clicks on fabric material checkbox \"Crepe\"\r\n    And  user clicks the Reset or Clear Filters button\r\n    Then the checkbox \"Linen\" should be deselected\r\n    And  the checkbox \"Crepe\" should be deselected","mediaType":"text/x.cucumber.gherkin+plain"}},{"gherkinDocument":{"uri":"classpath:features/FabricMaterialFilter.feature","feature":{"location":{"line":1,"column":1},"tags":[],"language":"en","keyword":"Feature","name":"Fabric Material and Neck Pattern Filter on WowFashions","description":"","children":[{"background":{"location":{"line":3,"column":3},"keyword":"Background","name":"","description":"","steps":[{"location":{"line":4,"column":5},"keyword":"Given ","keywordType":"Context","text":"user opens the Jalabiya products page","id":"d403fcde-d096-4486-abb5-faf821899ccc"}],"id":"98a2c60e-4654-432f-96f3-e8708554c28f"}},{"scenario":{"location":{"line":8,"column":3},"tags":[],"keyword":"Scenario","name":"Fabric Material section is collapsed by default","description":"","steps":[{"location":{"line":9,"column":5},"keyword":"Then ","keywordType":"Outcome","text":"the \"Fabric Material\" filter section should be collapsed by default","id":"7d94b2e9-56ec-443f-a288-0b1f8861fe33"}],"examples":[],"id":"c13c3b89-6277-47fa-abaa-61c71c63a89e"}},{"scenario":{"location":{"line":12,"column":3},"tags":[],"keyword":"Scenario","name":"User selects single fabric - Chiffon Zari","description":"","steps":[{"location":{"line":13,"column":5},"keyword":"When ","keywordType":"Action","text":"user clicks on fabric material checkbox \"Chiffon Zari\"","id":"28eb5b31-6cc8-4d65-b737-64ce967f0deb"},{"location":{"line":14,"column":5},"keyword":"Then ","keywordType":"Outcome","text":"the checkbox \"Chiffon Zari\" should be selected","id":"e3ed9963-570c-42cb-ae62-1691746f3 n is clickable on fabrics page\n    Then the fabrics Add to Cart button is visible\n    And the fabrics Add to Cart button is clickable\n\n  # ── Add to Cart Actions ─────────────────────────────────────\n\n  Scenario: TC_F06 - Success notification appears after adding fabric to cart\n    When user clicks the fabrics Add to Cart button\n    Then a fabrics success notification is displayed\n\n  Scenario: TC_F07 - Cart badge count increments after adding fabric product\n    When user clicks the fabrics Add to Cart button\n    Then the fabrics cart badge count increments\n\n  # ── Cart Page Verification ──────────────────────────────────\n\n  Scenario: TC_F08 - Cart contains the added fabric product\n    When user clicks the fabrics Add to Cart button\n    And user navigates to the fabrics cart\n    Then the fabrics cart contains the added product\n\n  Scenario: TC_F09 - Product name in cart matches the fabric product added\n    When user clicks the fabrics Add to Cart button\n    And user navigates to the fabrics cart\n    Then the fabrics product name in cart matches\n\n  Scenario: TC_F10 - Product price in cart is correct for fabric product\n    When user clicks the fabrics Add to Cart button\n    And user navigates to the fabrics cart\n    Then the fabrics product price in cart is correct\n\n  # ── Quantity Functionality (Positive) ──────────────────────\n\n  Scenario: TC_F11 - Cart quantity increases when increment button is clicked\n    When user clicks the fabrics Add to Cart button\n    And user navigates to the fabrics cart\n    When user increments the fabrics cart quantity\n    Then the fabrics cart quantity should increase by one\n\n  Scenario: TC_F12 - Cart subtotal updates after quantity increase\n    When user clicks the fabrics Add to Cart button\n    And user navigates to the fabrics cart\n    When user increments the fabrics cart quantity\n    Then the fabrics cart subtotal should update\n\n  # ── Quantity and Remove (Negative) ─────────────────────────\n\n  Scenario: TC_F13 - Cart quantity does not go below 1 when decrement clicked at minimum\n    When user clicks the fabrics Add to Cart button\n    And user navigates to the fabrics cart\n    When user decrements the fabrics cart quantity to minimum\n    Then the fabrics cart quantity should not go below one\n\n  Scenario: TC_F14 - Cart shows empty message after removing all items\n    When user clicks the fabrics Add to Cart button\n    And user navigates to the fabrics cart\n    When user removes all fabrics items from cart\n    Then the fabrics cart shows empty message\n\n  Scenario: TC_F15 - Cart item count decreases after removing one item\n    When user clicks the fabrics Add to Cart button\n    And user navigates to the fabrics cart\n    Then the fabrics cart contains the added product\n    When user removes one fabrics item from cart\n    Then the fabrics cart item count should decrease\n","mediaType":"text/x.cucumber.gherkin+plain"}},{"gherkinDocument":{"uri":"classpath:features/FabricsAddToCart.feature","feature":{"location":{"line":2,"column":1},"tags":[{"location":{"line":1,"column":1},"name":"@fabricscart","id":"4df26bd4-b373-4104-b97c-d1d78595e178"}],"language":"en","keyword":"Feature","name":"Fabrics Product Add to Cart on WowFashions","description":"","children":[{"background":{"location":{"line":4,"column":3},"keyword":"Background","name":"","description":"","steps":[{"location":{"line":5,"column":5},"keyword":"Given ","keywordType":"Context","text":"user opens a fabrics product page","id":"2f482284-ccd9-4013-982f-403f41b92962"}],"id":"0c16ab42-16d1-40e8-b9f3-679b54bb126f"}},{"scenario":{"location":{"line":9,"column":3},"tags":[],"keyword":"Scenario","name":"TC_F01 - Fabrics product page loads successfully","description":"","steps":[{"location":{"line":10,"column":5},"keyword":"Then ","keywordType":"Outcome","text":"the fabrics product page loads successfully","id":"5a2f3deb-e1f7-48a1-86b6-1ee6a7f1aea4"}],"examples":[],"id":"93a5e444-9ff9-47f7-  Max Price input should show \"2000\"\r\n\r\n  Scenario: User sets both Min and Max price range\r\n    When user clears the Min Price input and types \"300\"\r\n    And  user clears the Max Price input and types \"1500\"\r\n    And  user presses Tab to confirm\r\n    Then the product grid should refresh\r\n    And  products displayed should be between \"300\" and \"1500\" in price\r\n\r\n  Scenario: Setting Min Price higher than Max Price shows no results or error\r\n    When user clears the Min Price input and types \"9000\"\r\n    And  user clears the Max Price input and types \"1000\"\r\n    And  user presses Tab to confirm\r\n    Then either no products are shown or an error message is displayed\r\n\r\n  Scenario: Setting Max Price to 0 shows no results\r\n    When user clears the Max Price input and types \"0\"\r\n    And  user presses Tab to confirm\r\n    Then either no products are shown or an error message is displayed\r\n\r\n  Scenario: Price slider moves when Min input value changes\r\n    When user clears the Min Price input and types \"1000\"\r\n    And  user presses Tab to confirm\r\n    Then the left slider thumb position should reflect value \"1000\"\r\n\r\n  # ── Boundary Values ────────────────────────────────────────\r\n\r\n  Scenario Outline: Price range filter with boundary values\r\n    When user clears the Min Price input and types \"<min>\"\r\n    And  user clears the Max Price input and types \"<max>\"\r\n    And  user presses Tab to confirm\r\n    Then the product grid should refresh\r\n    And  the Min Price input should show \"<min>\"\r\n    And  the Max Price input should show \"<max>\"\r\n\r\n    Examples:\r\n      | min   | max   |\r\n      | 0     | 50000 |\r\n      | 100   | 500   |\r\n      | 500   | 5000  |\r\n      | 1000  | 10000 |\r\n      | 5000  | 50000 |\r\n\r\n  # ── Reset ──────────────────────────────────────────────────\r\n\r\n  Scenario: Resetting price filter restores default range\r\n    When user clears the Min Price input and types \"1000\"\r\n    And  user clears the Max Price input and types \"3000\"\r\n    And  user presses Tab to confirm\r\n    And  user clicks the Reset or Clear Filters button\r\n    Then the Min Price input should show \"0\"\r\n    And  the Max Price input should show \"50000\"\r\n    And  the product grid should refresh\r\n","mediaType":"text/x.cucumber.gherkin+plain"}},{"gherkinDocument":{"uri":"classpath:features/Filter.feature","feature":{"location":{"line":7,"column":1},"tags":[],"language":"en","keyword":"Feature","name":"Price Range Filter on WowFashions","description":"","children":[{"background":{"location":{"line":9,"column":3},"keyword":"Background","name":"","description":"","steps":[{"location":{"line":10,"column":5},"keyword":"Given ","keywordType":"Context","text":"user opens the Darziya brand page","id":"e6d3b109-7915-4ff7-9930-dff81a4a87f6"}],"id":"511de5de-67a7-42f7-af64-f2373efd80c0"}},{"scenario":{"location":{"line":14,"column":3},"tags":[],"keyword":"Scenario","name":"Default price range is shown on page load","description":"","steps":[{"location":{"line":15,"column":5},"keyword":"Then ","keywordType":"Outcome","text":"the Min Price input should show \"0\"","id":"5490ffe1-dd36-4c59-ace2-7dbac9a11358"},{"location":{"line":16,"column":5},"keyword":"And ","keywordType":"Conjunction","text":"the Max Price input should show \"50000\"","id":"ee380145-c190-43c7-98d4-26aba2b00c79"}],"examples":[],"id":"e7ebe2c5-68db-4883-9de9-8f3aad6e45ea"}},{"scenario":{"location":{"line":18,"column":3},"tags":[],"keyword":"Scenario","name":"User sets a custom Min Price using input box","description":"","steps":[{"location":{"line":19,"column":5},"keyword":"When ","keywordType":"Action","text":"user clears the Min Price input and types \"500\"","id":"62c856aa-1034-404b-a539-55982ffb1790"},{"location":{"line":20,"column":5},"keyword":"And ","keywordType":"Conjunction","text":"user presses Tab to confirm","id":"5ce8f66c-aeb5-495b-aff2-91aeb5db7f91"},{"location ING ==========\n\n  Scenario Outline: Search trims whitespace and returns results\n\n    When user searches for \"<keyword>\"\n    Then search results should be displayed\n\n    Examples:\n      | keyword      |\n      |  jalabiya    |\n      |  zahra       |\n\n\n  # ========== PARTIAL KEYWORD MATCH ==========\n\n  Scenario Outline: Partial keyword search returns results\n\n    When user searches for \"<keyword>\"\n    Then search results should be displayed\n    And results count should be greater than 0\n\n    Examples:\n      | keyword |\n      | jala    |\n      | zahra   |\n\n\n  # ========== BOUNDARY TESTS ==========\n\n\n  Scenario: Very long search keyword does not crash\n\n    When user searches for \"thisisaverylongkeywordthatisunlikelytomatchanyproductxyzabc12345\"\n    Then no application error is displayed\n\n\n  Scenario: Single character search does not crash\n\n    When user searches for \"a\"\n    Then no application error is displayed\n","mediaType":"text/x.cucumber.gherkin+plain"}},{"gherkinDocument":{"uri":"classpath:features/Search.feature","feature":{"location":{"line":1,"column":1},"tags":[],"language":"en","keyword":"Feature","name":"Search Functionality","description":"","children":[{"scenario":{"location":{"line":5,"column":3},"tags":[],"keyword":"Scenario Outline","name":"Search with valid keyword shows results","description":"","steps":[{"location":{"line":7,"column":5},"keyword":"When ","keywordType":"Action","text":"user searches for \"<keyword>\"","id":"96359e14-e054-467f-867d-b8a3a64728bf"},{"location":{"line":8,"column":5},"keyword":"Then ","keywordType":"Outcome","text":"search results should be displayed","id":"376f498e-c8f6-4d1b-80c6-ffc611aeba62"},{"location":{"line":9,"column":5},"keyword":"And ","keywordType":"Conjunction","text":"results count should be greater than 0","id":"994b9f6d-851f-4bed-86d4-323e7a6f5593"}],"examples":[{"location":{"line":11,"column":5},"tags":[],"keyword":"Examples","name":"","description":"","tableHe id email triggers OTP section\n    When user enters valid email and clicks Send OTP\n    Then the OTP input section is displayed\n\n  Scenario: TC03 - Valid email and valid OTP results in successful sign-in\n    When user enters valid email and clicks Send OTP\n    And  user enters valid OTP and clicks Verify and Continue\n    Then the user is successfully signed in\n\n  # ── Negative Scenarios ───────────────────────────────────\n\n  Scenario: TC04 - Send OTP button is disabled when email is empty\n    Then the Send OTP button is disabled\n\n  Scenario: TC05 - Invalid email format shows form validation error\n    When user enters \"notanemail\" and clicks Send OTP\n    Then a validation or error message is displayed\n\n  Scenario: TC06 - Empty OTP field keeps Verify button disabled\n    When user enters valid email and clicks Send OTP\n    And  user leaves the OTP field empty\n    Then the Verify and Continue button is disabled\n\n  Scenario: TC07 - Wrong OTP shows error message\n    When user enters valid email and clicks Send OTP\n    And  user enters OTP \"000000\" and clicks Verify and Continue\n    Then a validation or error message is displayed\n\n  Scenario: TC08 - Short OTP keeps Verify button disabled\n    When user enters valid email and clicks Send OTP\n    And  user enters short OTP \"123\"\n    Then the Verify and Continue button is disabled\n\n  # ── Logout ───────────────────────────────────────────────\n\n  Scenario: TC09 - User can successfully logout\n    When user enters valid email and clicks Send OTP\n    And  user enters valid OTP and clicks Verify and Continue\n    And  user clicks account menu and logs out\n    Then the user is redirected to the home page\n","mediaType":"text/x.cucumber.gherkin+plain"}},{"gherkinDocument":{"uri":"classpath:features/SignIn.feature","feature":{"location":{"line":10,"column":1},"tags":[{"location":{"line":9,"column":1},"name":"@signin","id":"471c826d-43bf-4e93-af48-33167ca406f2"}],"language":"en","keyword":"Fea
